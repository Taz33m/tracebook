name: orderbook-rs integration

on:
  workflow_dispatch:
  schedule:
    - cron: "31 6 * * 1"
  pull_request:
    paths:
      - ".github/workflows/orderbook-rs.yml"
      - "integrations/flash_benchmark/**"
      - "integrations/orderbook_rs/**"
      - "src/tracebook/conformance/**"
      - "src/tracebook/events/market_replay.py"
      - "tests/test_external_integrations.py"
      - "tests/test_flash_bridge.py"

permissions:
  contents: read

jobs:
  native-rust-adapter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Install Flash build prerequisite
        run: |
          sudo apt-get update
          sudo apt-get install --yes libboost-dev

      - name: Configure integration paths
        run: |
          echo "ADAPTER=$GITHUB_WORKSPACE/integrations/orderbook_rs/target/release/tracebook-orderbook-rs" >> "$GITHUB_ENV"
          echo "FAULTY_ADAPTER=$GITHUB_WORKSPACE/integrations/orderbook_rs/target/release/faulty-orderbook-adapter" >> "$GITHUB_ENV"
          echo "HISTORICAL_ADAPTER=$GITHUB_WORKSPACE/integrations/orderbook_rs/target/release/orderbook-rs-issue-88-adapter" >> "$GITHUB_ENV"
          echo "REPORT_ROOT=$RUNNER_TEMP/orderbook-rs" >> "$GITHUB_ENV"

      - name: Install Tracebook
        run: python -m pip install -e .

      - name: Build and lint the pinned native adapter
        working-directory: integrations/orderbook_rs
        run: |
          cargo fmt --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked
          cargo build --release --locked
          cargo clippy --locked --no-default-features --features historical-issue-88 --bin orderbook-rs-issue-88-adapter -- -D warnings
          cargo build --release --locked --no-default-features --features historical-issue-88 --bin orderbook-rs-issue-88-adapter

      - name: Verify the fixed native trace
        run: |
          mkdir -p "$REPORT_ROOT"
          tracebook-conformance run \
            integrations/orderbook_rs/fifo-compatible.jsonl \
            --output "$REPORT_ROOT/fifo-compatible.json" \
            --candidate "$ADAPTER"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads((Path(os.environ["REPORT_ROOT"]) / "fifo-compatible.json").read_text())
          assert report["conformant"] is True
          assert report["compared_events"] == 13
          assert report["candidate_engine"] == {
              "language": "Rust",
              "name": "orderbook-rs FIFO adapter",
              "version": "0.12.0",
          }
          assert report["final_state_hash"] == "21a9606e7c77c3b239259f5032245c6330ddcd1d3f7fa25394612d9818becee3"
          PY

      - name: Qualify fifo-limit-v1
        run: |
          tracebook-conformance qualify \
            --profile fifo-limit-v1 \
            --seed 42 \
            --traces 25 \
            --events-per-trace 200 \
            --max-minimize-runs 100 \
            --candidate-cmd "$ADAPTER" \
            --output-dir "$REPORT_ROOT/qualification"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(
              (Path(os.environ["REPORT_ROOT"]) / "qualification" / "qualification.json").read_text()
          )
          assert report["qualified"] is True
          assert report["qualification_id"] == "sha256:5597e97cf8dbf42d25dedb035bb6e1fd05dbdb2ea31d2576a802fd9b3d0efee4"
          assert report["candidate_runs"] == 28
          assert report["campaign"]["generated_events"] == 5000
          assert report["campaign"]["semantic_coverage"]["coverage_ratio"] == 1.0
          PY

      - name: Verify the honest standard-suite profile
        run: |
          tracebook-conformance sample "$REPORT_ROOT/standard-suite"
          set +e
          tracebook-conformance suite \
            "$REPORT_ROOT/standard-suite" \
            --output "$REPORT_ROOT/standard-suite.json" \
            --candidate "$ADAPTER"
          status=$?
          set -e
          if [ "$status" -ne 1 ]; then
            echo "Expected the two documented contract differences to produce exit 1, got $status" >&2
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads((Path(os.environ["REPORT_ROOT"]) / "standard-suite.json").read_text())
          passed = {case["name"] for case in report["cases"] if case["report"]["conformant"]}
          failed = {case["name"] for case in report["cases"] if not case["report"]["conformant"]}
          assert report["suite_id"] == "tracebook-conformance-v2"
          assert report["suite_hash"] == "sha256:7b82f87088fbbaa760c8623243d8abfce5be57a477ebea91527b74309190decd"
          assert passed == {
              "fifo-lifecycle",
              "order-instructions",
              "stp-cancel-resting",
              "stp-cancel-incoming",
              "multi-symbol",
              "tick-grid",
              "deep-cancellation",
          }
          assert failed == {"pro-rata-allocation", "stp-cancel-resting-deep"}
          divergences = {
              case["name"]: case["report"]["divergence"]
              for case in report["cases"]
              if not case["report"]["conformant"]
          }
          assert divergences["pro-rata-allocation"]["category"] == "trades"
          stp = divergences["stp-cancel-resting-deep"]
          assert stp["event_index"] == 4
          assert stp["category"] == "book_state"
          assert stp["kind"] == "length_mismatch"
          assert stp["path"] == "$.state.books[0].asks"
          assert stp["reference"] == 1
          assert stp["candidate"] == 0
          PY

      - name: Run the generated FIFO instruction campaign
        run: |
          tracebook-conformance campaign \
            --output-dir "$REPORT_ROOT/campaign" \
            --profile fifo-full-v1 \
            --seed 20260713 \
            --traces 10 \
            --events-per-trace 100 \
            --max-minimize-runs 100 \
            --candidate "$ADAPTER"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads((Path(os.environ["REPORT_ROOT"]) / "campaign" / "campaign.json").read_text())
          assert report["conformant"] is True
          assert report["generated_events"] == 1000
          assert report["campaign_id"] == "sha256:95c3dac9d27b770a5cccebe9ff16b6e71af443001d633b640983f02f3e04b3c9"
          assert report["semantic_coverage"]["coverage_ratio"] == 1.0
          PY

      - name: Prove event-173 queue drift reduces to five events
        run: |
          set +e
          tracebook-conformance campaign \
            --profile fifo-limit-v1 \
            --seed 42 \
            --traces 1000 \
            --events-per-trace 200 \
            --candidate-cmd "$FAULTY_ADAPTER" \
            --corpus-dir "$REPORT_ROOT/queue-priority-corpus" \
            --stop-after-first \
            --junit-output "$REPORT_ROOT/queue-priority-campaign.xml"
          status=$?
          set -e
          if [ "$status" -ne 1 ]; then
            echo "Expected the intentional queue-priority drift to produce exit 1, got $status" >&2
            exit 1
          fi

          FAILURE_DIR="$REPORT_ROOT/queue-priority-corpus/failure-bc8b19d3e0e3441a98db"
          tracebook-conformance reproduce \
            "$FAILURE_DIR/reduced.jsonl" \
            --candidate-cmd "$FAULTY_ADAPTER" \
            --output "$REPORT_ROOT/queue-priority-reproduction.json" \
            --junit-output "$REPORT_ROOT/queue-priority-reproduction.xml"
          tracebook-conformance run \
            "$FAILURE_DIR/reduced.jsonl" \
            --candidate-cmd "$ADAPTER" \
            --output "$REPORT_ROOT/queue-priority-regression.json"

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from xml.etree import ElementTree

          root = Path(os.environ["REPORT_ROOT"])
          failure_dir = root / "queue-priority-corpus" / "failure-bc8b19d3e0e3441a98db"
          campaign = json.loads((failure_dir / "campaign.json").read_text())
          failure = json.loads((failure_dir / "failure.json").read_text())
          reproduction = json.loads((root / "queue-priority-reproduction.json").read_text())
          regression = json.loads((root / "queue-priority-regression.json").read_text())
          assert campaign["campaign_id"] == "sha256:3630ea1789e27b6e416e1e241ca4ef8d5a28f0f2bf660fae3c0a1c8ff39ba7c6"
          assert campaign["semantic_coverage"]["covered_count"] == 10
          assert failure["failure_class"] == "queue-priority drift"
          assert failure["original_divergence_event"] == 173
          assert failure["original_event_count"] == 173
          assert failure["reduced_event_count"] == 5
          assert failure["one_minimal"] is True
          assert reproduction["reproduced"] is True
          assert reproduction["conformance_report"]["divergence"]["path"] == "$.observation.trades[0].sell_order_id"
          assert regression["conformant"] is True
          assert ElementTree.parse(root / "queue-priority-campaign.xml").getroot().attrib["failures"] == "1"
          assert ElementTree.parse(root / "queue-priority-reproduction.xml").getroot().attrib["failures"] == "0"
          PY

      - name: Reduce the historical issue 88 defect to four events
        run: |
          set +e
          tracebook-conformance campaign \
            --profile fifo-partial-fill-v1 \
            --seed 42 \
            --traces 1000 \
            --events-per-trace 200 \
            --max-minimize-runs 200 \
            --candidate-cmd "$HISTORICAL_ADAPTER" \
            --corpus-dir "$REPORT_ROOT/historical-issue-88-corpus" \
            --stop-after-first \
            --junit-output "$REPORT_ROOT/historical-issue-88-campaign.xml"
          status=$?
          set -e
          if [ "$status" -ne 1 ]; then
            echo "Expected historical orderbook-rs issue 88 to produce exit 1, got $status" >&2
            exit 1
          fi

          FAILURE_DIR="$REPORT_ROOT/historical-issue-88-corpus/failure-7dd023c684cdb2d0fc0e"
          cmp "$FAILURE_DIR/reduced.jsonl" integrations/orderbook_rs/regressions/issue-88-reduced.jsonl
          tracebook-conformance reproduce \
            "$FAILURE_DIR/reduced.jsonl" \
            --candidate-cmd "$HISTORICAL_ADAPTER" \
            --output "$REPORT_ROOT/historical-issue-88-reproduction.json" \
            --junit-output "$REPORT_ROOT/historical-issue-88-reproduction.xml"
          tracebook-conformance run \
            integrations/orderbook_rs/regressions/issue-88-reduced.jsonl \
            --candidate-cmd "$ADAPTER" \
            --output "$REPORT_ROOT/historical-issue-88-fixed.json"

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from xml.etree import ElementTree

          root = Path(os.environ["REPORT_ROOT"])
          failure_dir = root / "historical-issue-88-corpus" / "failure-7dd023c684cdb2d0fc0e"
          campaign = json.loads((failure_dir / "campaign.json").read_text())
          failure = json.loads((failure_dir / "failure.json").read_text())
          reproduction = json.loads((root / "historical-issue-88-reproduction.json").read_text())
          fixed = json.loads((root / "historical-issue-88-fixed.json").read_text())

          assert campaign["campaign_id"] == "sha256:e8e158af0223b4e61dbb7efeab10cfd1b34b0d3b478b3e086c12bea008c0b4aa"
          assert campaign["semantic_coverage"]["coverage_ratio"] == 1.0
          assert failure["failure_id"] == "failure-7dd023c684cdb2d0fc0e"
          assert failure["failure_class"] == "queue-priority drift"
          assert failure["original_divergence_event"] == 173
          assert failure["original_event_count"] == 173
          assert failure["reduced_event_count"] == 4
          assert failure["one_minimal"] is True
          assert failure["candidate_engine"] == {
              "language": "Rust",
              "name": "historical orderbook-rs issue 88 adapter",
              "version": "0.8.0@53b4d2b0+pricelevel-0.7.0",
          }

          divergence = reproduction["conformance_report"]["divergence"]
          assert reproduction["reproduced"] is True
          assert divergence["path"] == "$.observation.trades[0].sell_order_id"
          assert divergence["reference"] == 9100000001
          assert divergence["candidate"] == 9100000002
          assert fixed["conformant"] is True
          assert ElementTree.parse(root / "historical-issue-88-campaign.xml").getroot().attrib["failures"] == "1"
          assert ElementTree.parse(root / "historical-issue-88-reproduction.xml").getroot().attrib["failures"] == "0"
          PY

      - name: Rebuild the Flash-to-Tracebook handoff
        env:
          FLASH_COMMIT: eb6e89fbc4313f77cea7d424bab14a26093cf552
          ORDERBOOK_RS_COMMIT: 53b4d2b0a657f4260e316d3a8ac3f0df0fc068bf
        run: |
          set -euo pipefail
          FLASH_ROOT="$RUNNER_TEMP/matching-engine-benchmark"
          ORDERBOOK_SRC="$RUNNER_TEMP/flash-orderbook-rs"
          WRAPPER="$RUNNER_TEMP/flash-orderbookrs-wrapper"
          HANDOFF="$REPORT_ROOT/flash-handoff"
          mkdir -p "$HANDOFF"

          git clone --quiet https://github.com/flash1-dev/matching-engine-benchmark.git "$FLASH_ROOT"
          git -C "$FLASH_ROOT" checkout --quiet --detach "$FLASH_COMMIT"
          cmake -S "$FLASH_ROOT" -B "$FLASH_ROOT/build" -DCMAKE_BUILD_TYPE=Release
          cmake --build "$FLASH_ROOT/build" -j2

          git clone --quiet https://github.com/joaquinbejar/OrderBook-rs.git "$ORDERBOOK_SRC"
          git -C "$ORDERBOOK_SRC" checkout --quiet --detach "$ORDERBOOK_RS_COMMIT"
          cp -R "$FLASH_ROOT/additional_references/orderbookrs_adapter/wrapper" "$WRAPPER"
          export ORDERBOOK_SRC WRAPPER
          python - <<'PY'
          import os
          from pathlib import Path

          manifest = Path(os.environ["WRAPPER"]) / "Cargo.toml"
          text = manifest.read_text(encoding="utf-8")
          text = text.replace("../../../third_party/OrderBook-rs", os.environ["ORDERBOOK_SRC"])
          text = text.split("\n[patch.crates-io]\n", 1)[0] + "\n"
          manifest.write_text(text, encoding="utf-8")
          PY
          cargo build --release --manifest-path "$WRAPPER/Cargo.toml"

          cp "$FLASH_ROOT/reference/canonical_output.txt.gz" "$HANDOFF/flash-reference.txt.gz"
          set +e
          (
            cd "$FLASH_ROOT"
            ./harness \
              --engine "$WRAPPER/target/release/liborderbookrs_adapter.so" \
              --scenario normal \
              --mode perf \
              --matcher-core -1 \
              --drainer-core -1 \
              --write-canonical-output "$HANDOFF/orderbook-rs-0.8.0-candidate.txt"
          )
          harness_status=$?
          set -e
          if [ "$harness_status" -ne 1 ]; then
            echo "Expected the affected Flash adapter to fail consensus, got $harness_status" >&2
            exit 1
          fi

          echo "d925e1a4fc03cfcf7f0db8f9ad4c6c8674991250b702e9dc3f1b2b7c9f4bfbc1  $FLASH_ROOT/orders_normal_s23_n1000000.bin" | sha256sum -c -
          echo "088fa3c690bc76c513b8fffbbce2d49c2874cca470507d4d679d3344c102281c  $HANDOFF/flash-reference.txt.gz" | sha256sum -c -

          set +e
          (
            cd "$HANDOFF"
            python "$FLASH_ROOT/scripts/explain_divergence.py" \
              flash-reference.txt.gz \
              orderbook-rs-0.8.0-candidate.txt \
              --json-output divergence.json
          )
          comparator_status=$?
          set -e
          if [ "$comparator_status" -ne 1 ]; then
            echo "Expected Flash's comparator to report divergence, got $comparator_status" >&2
            exit 1
          fi
          cmp \
            "$HANDOFF/divergence.json" \
            integrations/flash_benchmark/artifacts/orderbook-rs-issue-88-divergence.json

          python integrations/flash_benchmark/bridge.py \
            "$HANDOFF/divergence.json" \
            "$FLASH_ROOT/orders_normal_s23_n1000000.bin" \
            "$HANDOFF/prefix.jsonl"
          echo "4e0bb497924a68dcca9575a5860954089bf5d137ab1f577618fba482a19877cd  $HANDOFF/prefix.jsonl" | sha256sum -c -

          tracebook-conformance minimize \
            "$HANDOFF/prefix.jsonl" \
            --tick-size 1 \
            --quantity-decimal-places 0 \
            --events-output "$HANDOFF/reduced.jsonl" \
            --output "$HANDOFF/minimization.json" \
            --junit-output "$HANDOFF/minimization.xml" \
            --max-runs 200 \
            --candidate-cmd "$HISTORICAL_ADAPTER"
          cmp \
            "$HANDOFF/reduced.jsonl" \
            integrations/orderbook_rs/regressions/flash-issue-88-reduced.jsonl

          tracebook-conformance reproduce \
            "$HANDOFF/reduced.jsonl" \
            --tick-size 1 \
            --quantity-decimal-places 0 \
            --output "$HANDOFF/reproduction.json" \
            --junit-output "$HANDOFF/reproduction.xml" \
            --candidate-cmd "$HISTORICAL_ADAPTER"
          tracebook-conformance run \
            "$HANDOFF/reduced.jsonl" \
            --tick-size 1 \
            --quantity-decimal-places 0 \
            --output "$HANDOFF/fixed.json" \
            --candidate-cmd "$ADAPTER"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["REPORT_ROOT"]) / "flash-handoff"
          minimization = json.loads((root / "minimization.json").read_text())
          reproduction = json.loads((root / "reproduction.json").read_text())
          fixed = json.loads((root / "fixed.json").read_text())
          assert minimization["original_event_count"] == 15739
          assert minimization["minimized_event_count"] == 4
          assert minimization["runs"] == 193
          assert minimization["one_minimal"] is True
          assert minimization["budget_exhausted"] is False
          assert reproduction["failure_class"] == "queue-priority drift"
          assert reproduction["reproduced"] is True
          assert reproduction["conformance_report"]["divergence"]["event_index"] == 4
          assert fixed["conformant"] is True
          PY

      - name: Prove Rust-side trade drift is detected
        run: |
          set +e
          tracebook-conformance run \
            integrations/orderbook_rs/fifo-compatible.jsonl \
            --output "$REPORT_ROOT/intentional-drift.json" \
            --candidate "$ADAPTER" --test-fault=drop-first-trade
          status=$?
          set -e
          if [ "$status" -ne 1 ]; then
            echo "Expected intentional semantic drift to produce exit 1, got $status" >&2
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads((Path(os.environ["REPORT_ROOT"]) / "intentional-drift.json").read_text())
          assert report["conformant"] is False
          assert report["divergence"]["event_index"] == 3
          assert report["divergence"]["category"] == "trades"
          PY

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: orderbook-rs-conformance
          path: ${{ runner.temp }}/orderbook-rs
          if-no-files-found: error
