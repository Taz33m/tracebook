name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,dashboard]"

      - name: Run format check
        run: python -m black --check src tests examples integrations install_deps.py test_system.py

      - name: Run lint
        run: python -m flake8 src tests examples integrations install_deps.py test_system.py

      - name: Run type check
        run: python -m mypy --python-version "${{ matrix.python-version }}" src/tracebook

      - name: Run security static analysis
        run: python -m bandit -q -r src integrations

      - name: Run compile check
        run: python -m compileall -q src tests examples integrations install_deps.py test_system.py

      - name: Run pytest with coverage gate
        run: python -m pytest --cov=tracebook --cov-report=term-missing --cov-fail-under=75

      - name: Run system smoke test
        run: python test_system.py

      - name: Run simulation CLI smoke
        run: tracebook-sim --duration 1 --throughput 50 --algorithm FIFO --seed 1337 --warmup-seconds 0.01

      - name: Run benchmark smoke
        run: tracebook-benchmark --scenario smoke --duration 1 --throughput 50 --seed 1337 --warmup-seconds 0.01 --output benchmark_results/ci-smoke.json

      - name: Build package artifacts
        run: python -m build --sdist --wheel --outdir dist

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke installed wheel and console scripts
        run: |
          python -m pip uninstall -y tracebook-sim
          python -m pip install --no-deps dist/*.whl
          cd /tmp
          python -c "import importlib.metadata as m, tracebook; assert tracebook.__version__ == m.version('tracebook-sim')"
          tracebook-sim --version
          tracebook-benchmark --version
          tracebook-dashboard --version
          tracebook-web --version
          tracebook-corpus --version
          tracebook-conformance --version
          tracebook-replay "$GITHUB_WORKSPACE/examples/data/sample_events.jsonl" --output /tmp/replay.json
          tracebook-coinbase \
            "$GITHUB_WORKSPACE/examples/data/coinbase_btcusd_l3_snapshot.json" \
            "$GITHUB_WORKSPACE/examples/data/coinbase_btcusd_full.jsonl" \
            --tick-size 0.01 \
            --output /tmp/coinbase.json
          tracebook-corpus sample /tmp/tracebook-sample-corpus
          tracebook-corpus verify /tmp/tracebook-sample-corpus --output /tmp/corpus-verify.json
          tracebook-conformance sample /tmp/tracebook-conformance-suite
          tracebook-conformance suite \
            /tmp/tracebook-conformance-suite \
            --output /tmp/conformance-suite.json \
            --candidate python "$GITHUB_WORKSPACE/examples/conformance_adapter.py"
          tracebook-conformance campaign \
            --output-dir /tmp/tracebook-conformance-campaign \
            --profile fifo-limit-v1 \
            --seed 20260713 \
            --traces 3 \
            --events-per-trace 25 \
            --candidate python "$GITHUB_WORKSPACE/examples/conformance_adapter.py"
          python -c "import json; assert json.load(open('/tmp/replay.json'))['applied_events'] == 5"
          python -c "import json; assert json.load(open('/tmp/coinbase.json'))['normalization']['sequence_complete'] is True"
          python -c "import json; assert json.load(open('/tmp/corpus-verify.json'))['verified'] is True"
          python -c "import json; assert json.load(open('/tmp/conformance-suite.json'))['conformant'] is True"
          python -c "import json; p=json.load(open('/tmp/tracebook-conformance-campaign/campaign.json')); assert p['conformant'] is True and p['generated_events'] == 75 and p['generator_version'] == 1"

      - name: Check installed dependencies
        run: python -m pip check

      - name: Dashboard import and help smoke
        run: |
          python -c "from tracebook.visualization.dashboard import create_dashboard; create_dashboard()"
          tracebook-dashboard --demo-simulation --help
