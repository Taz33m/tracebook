name: PythonMatchingEngine integration

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"
  pull_request:
    paths:
      - ".github/workflows/python-matching-engine.yml"
      - "integrations/python_matching_engine/**"
      - "src/tracebook/conformance/**"
      - "src/tracebook/events/market_replay.py"
      - "tests/test_conformance_campaign.py"
      - "tests/test_external_integrations.py"

permissions:
  contents: read

jobs:
  pinned-upstream:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      UPSTREAM_COMMIT: f94150294a85d7b415ca4518590b5a661d6f9958

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure the upstream checkout path
        run: echo "PYTHON_MATCHING_ENGINE_PATH=$RUNNER_TEMP/PythonMatchingEngine" >> "$GITHUB_ENV"

      - name: Install Tracebook and current upstream runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . "pandas>=2.3.3" "PyYAML>=6.0.2"

      - name: Fetch the pinned PythonMatchingEngine revision
        run: |
          git init "$PYTHON_MATCHING_ENGINE_PATH"
          git -C "$PYTHON_MATCHING_ENGINE_PATH" remote add origin https://github.com/Surbeivol/PythonMatchingEngine.git
          git -C "$PYTHON_MATCHING_ENGINE_PATH" fetch --depth 1 origin "$UPSTREAM_COMMIT"
          git -C "$PYTHON_MATCHING_ENGINE_PATH" checkout --detach FETCH_HEAD
          test "$(git -C "$PYTHON_MATCHING_ENGINE_PATH" rev-parse HEAD)" = "$UPSTREAM_COMMIT"

      - name: Verify the native FIFO and lifecycle subset
        run: |
          tracebook-conformance run \
            integrations/python_matching_engine/fifo-compatible.jsonl \
            --output /tmp/python-matching-engine-compatible.json \
            --timeout 20 \
            --candidate python integrations/python_matching_engine/adapter.py
          python -c "import json; p=json.load(open('/tmp/python-matching-engine-compatible.json')); assert p['conformant'] is True and p['compared_events'] == 13; assert p['candidate_engine']['version'] == 'f94150294a85'; assert p['final_state_hash'] == '21a9606e7c77c3b239259f5032245c6330ddcd1d3f7fa25394612d9818becee3'"

      - name: Verify the expected full-suite contract profile
        run: |
          tracebook-conformance sample /tmp/tracebook-conformance-v1
          set +e
          tracebook-conformance suite \
            /tmp/tracebook-conformance-v1 \
            --output /tmp/python-matching-engine-suite.json \
            --timeout 20 \
            --candidate python integrations/python_matching_engine/adapter.py
          status=$?
          set -e
          if [ "$status" -ne 1 ]; then
            echo "Expected semantic-difference exit code 1, got $status" >&2
            exit 1
          fi
          python -c "import json; p=json.load(open('/tmp/python-matching-engine-suite.json')); passed={c['name'] for c in p['cases'] if c['report']['conformant']}; assert p['suite_hash'] == 'sha256:0ec99b73c86ce04b9a1fc123a4cbf93e74a69a80c664d0d908c8a22d8528bfe7'; assert passed == {'fifo-lifecycle', 'deep-cancellation'}"

      - name: Run the generated FIFO lifecycle campaign
        run: |
          tracebook-conformance campaign \
            --output-dir /tmp/python-matching-engine-campaign \
            --profile fifo-limit-v1 \
            --seed 20260713 \
            --traces 10 \
            --events-per-trace 50 \
            --max-minimize-runs 40 \
            --timeout 20 \
            --candidate python integrations/python_matching_engine/adapter.py
          python -c "import json; p=json.load(open('/tmp/python-matching-engine-campaign/campaign.json')); assert p['campaign_id'] == 'sha256:53e31761dbcc5b5858506c7f11b81b1ad9cae281d46fb8212c1d62a89d058a2d'; assert p['conformant'] is True and p['generated_events'] == 500; assert p['candidate_engine']['version'] == 'f94150294a85'; assert p['semantic_coverage']['coverage_ratio'] == 1.0"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: python-matching-engine-conformance
          path: |
            /tmp/python-matching-engine-compatible.json
            /tmp/python-matching-engine-suite.json
            /tmp/python-matching-engine-campaign
          if-no-files-found: error
