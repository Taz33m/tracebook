name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package and release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,dashboard]"

      - name: Run release quality gate
        run: |
          python -m black --check src tests examples integrations experiments install_deps.py test_system.py
          python -m flake8 src tests examples integrations experiments install_deps.py test_system.py
          python -m mypy --python-version 3.13 src/tracebook experiments
          python -m bandit -q -r src integrations
          python -m compileall -q src tests examples integrations experiments install_deps.py test_system.py
          python -m pytest --cov=tracebook --cov-report=term-missing --cov-fail-under=75
          python test_system.py

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION=$(python -c "exec(open('src/tracebook/_version.py').read()); print(__version__)")
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION"

      - name: Build and validate distributions
        run: |
          python -m build --sdist --wheel --outdir dist
          python -m twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tracebook-sim/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
