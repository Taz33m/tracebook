version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
  - package-ecosystem: cargo
    directory: /integrations/orderbook_rs
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/New_York
    open-pull-requests-limit: 3
