name: Bug report
description: Report incorrect behavior or a regression.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest command or Python snippet that reproduces the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, install command, and optional extras.
      placeholder: "Python 3.11, macOS/Linux, pip install -e ."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or benchmark JSON
      render: text
