name: Feature request
description: Suggest a capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - matching engine
        - simulation
        - benchmarks
        - dashboard
        - profiling
        - docs
        - packaging
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should we know this is done?
