name: Matching engine conformance

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Tracebook
        run: python -m pip install "tracebook-sim==0.4.1"

      # Replace this command with the candidate engine's build step.
      - name: Build candidate engine
        run: make build

      - name: Compare matching semantics
        run: |
          mkdir -p artifacts
          tracebook-conformance campaign \
            --profile fifo-limit-v1 \
            --seed 42 \
            --traces 25 \
            --events-per-trace 200 \
            --candidate-cmd './build/matching-engine --tracebook-stdio' \
            --corpus-dir artifacts/corpus \
            --stop-after-first \
            --junit-output artifacts/conformance.xml

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: matching-engine-conformance
          path: artifacts
          if-no-files-found: error
